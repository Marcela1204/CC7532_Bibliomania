name: Run script

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      API_KEY: ${{ secrets.API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install supabase dotenv

      - name: Run python
        run: python lab4/ILeitor.py
